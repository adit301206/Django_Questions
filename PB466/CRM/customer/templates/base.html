<!DOCTYPE html>
<html>
<head>
  <title>Django CRM</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
  <nav class="navbar navbar-dark bg-dark px-3 mb-4">
    <a class="navbar-brand" href="{% url 'home' %}">Django CRM</a>
    <div>
      {% if user.is_authenticated %}
        <a class="btn btn-outline-light btn-sm" href="{% url 'addrecord' %}">Add Record</a>
        <a class="btn btn-outline-danger btn-sm" href="{% url 'logout' %}">Logout</a>
      {% else %}
        <a class="btn btn-outline-light btn-sm" href="{% url 'login' %}">Login</a>
        <a class="btn btn-outline-success btn-sm" href="{% url 'register' %}">Register</a>
      {% endif %}
    </div>
  </nav>

  <div class="container">
    {% for message in messages %}
      <div class="alert alert-info">{{ message }}</div>
    {% endfor %}
    {% block content %}{% endblock %}
  </div>
</body>
</html>
